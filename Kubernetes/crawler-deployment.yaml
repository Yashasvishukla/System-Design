apiVersion: apps/v1
kind: Deployment
metadata:
  name: synergychat-crawler
  labels:
    app: synergychat-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synergychat-crawler
  template:
    metadata:
      labels:
        app: synergychat-crawler
    spec:
      containers:
      - name: synergychat-crawler
        image: bootdotdev/synergychat-crawler:latest
        envFrom:
          - configMapRef:
              name: synergychat-crawler-config


# Important thing to notice is configMapRef and ConfigMapKeyRef. 
# The former is used when you want to load all the key-value pairs from a ConfigMap as environment variables, while the latter is used when you want to load a specific key from a ConfigMap as an environment variable. In this case, we are using configMapRef to load all the key-value pairs from the synergychat-crawler-config ConfigMap as environment variables for the synergychat-crawler container.